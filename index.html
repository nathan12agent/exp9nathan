<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Test App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
            background-color: #f0f8ff;
            color: #333;
        }
        h1 {
            color: #0073e6;
        }
        p {
            font-size: 1.2em;
        }
        .timestamp {
            margin-top: 20px;
            font-style: italic;
            color: #555;
        }
    </style>
</head>
<body>
    <h1>Hello from AWS CodeBuild + S3!</h1>
    <p>This is a simple test page.</p>
    <div class="timestamp">
        Current time: <span id="time"></span>
    </div>

    <script>
        // Show current date and time
        function updateTime() {
            const now = new Date();
            document.getElementById('time').textContent = now.toLocaleString();
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
